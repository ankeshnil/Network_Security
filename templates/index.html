<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phishing Detector</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #00f2fe;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #00f2fe;
            color: black;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4facfe;
            transform: scale(1.05);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="icon">🔐</div>
        <h1>Phishing Detector</h1>

        <form action="/predict_form" method="post">
            <input type="text" name="url" placeholder="Enter website URL..." required>
            <br>
            <button type="submit">Check Website</button>
        </form>

        <div class="footer">
            Stay safe from phishing attacks 🚀
        </div>
    </div>

</body>
</html>
