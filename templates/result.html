<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detection Result</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 450px;
        }

        h1 {
            margin-bottom: 15px;
        }

        .url-box {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            word-wrap: break-word;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }

        .safe {
            background-color: rgba(0, 255, 0, 0.2);
            color: #00ffcc;
        }

        .phishing {
            background-color: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 20px;
            background: #00f2fe;
            color: black;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background: #4facfe;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔍 Detection Result</h1>

        <div class="url-box">
            <b>URL:</b> {{ url }}
        </div>

        <!-- Dynamic Result Styling -->
        <div class="result {% if result == 'Safe' %}safe{% else %}phishing{% endif %}">
            {{ result }}
        </div>

        <a href="/home">Check Another URL</a>
    </div>

</body>
</html>
